<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create your account — TaskFlow</title>

  <!-- Keep the SIGNUP itself as ONE clean conversion: we count it when the new
       user lands on the welcome page (mapped in the Zephra wizard), so we tell
       the SDK NOT to auto-capture this form submit as a separate event.
       This flag must be set BEFORE the snippet loads. -->
  <script>window.AdsGenNoAutoForms = true;</script>

  <!-- ZEPHRA TRACKING SNIPPET (same on every page) -->
  <script src="https://zephraai.com/sdk.js?cid=cli_Lu6h_2nI1kc&consent=auto" async></script>

  <style>
    :root { --ink:#0F1923; --teal:#00C4A1; --muted:#5b6b7a; --line:#e7ecf1; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
           color: var(--ink); background: #f7f9fb; min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; width: 100%; max-width: 420px;
            padding: 36px 34px; box-shadow: 0 10px 40px rgba(15,25,35,.06); }
    .logo { font-weight: 800; font-size: 1.2rem; text-align: center; margin-bottom: 6px; }
    .logo span { color: var(--teal); }
    .card h1 { font-size: 1.4rem; text-align: center; letter-spacing: -.02em; margin-bottom: 4px; }
    .card .sub { text-align: center; color: var(--muted); font-size: .92rem; margin-bottom: 26px; }
    label { display: block; font-size: .82rem; font-weight: 600; margin: 14px 0 6px; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #d7dee5; border-radius: 9px; font-size: .95rem;
            font-family: inherit; }
    input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px #d8f5ee; }
    .btn { width: 100%; margin-top: 22px; border: none; cursor: pointer; font-weight: 700; border-radius: 9px;
           padding: 13px; font-size: .98rem; background: var(--teal); color: var(--ink); font-family: inherit; }
    .btn:disabled { opacity: .7; cursor: default; }
    .foot { text-align: center; color: var(--muted); font-size: .86rem; margin-top: 20px; }
    .foot a { color: #036; font-weight: 600; text-decoration: none; }
    .back { display:block; text-align:center; margin-top:18px; color:var(--muted); font-size:.85rem; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Task<span>Flow</span></div>
    <h1>Create your account</h1>
    <p class="sub">Free for up to 5 people. No credit card needed.</p>

    <form id="signup-form" onsubmit="return handleSignup(event)">
      <label for="name">Full name</label>
      <input id="name" name="name" type="text" placeholder="Priya Sharma" required />

      <label for="email">Work email</label>
      <input id="email" name="email" type="email" placeholder="you@company.com" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="At least 8 characters" required minlength="8" />

      <button type="submit" class="btn" id="submitBtn">Create your account</button>
    </form>

    <p class="foot">Already have an account? <a href="signup.html">Log in</a></p>
    <a class="back" href="index.html">← Back to home</a>
  </div>

  <script>
    // Static demo: no real backend. We just simulate the account being created
    // and send the new user to the welcome page — that page load is what Zephra
    // counts as the "Sign-up" conversion (mapped in the wizard).
    function handleSignup(e) {
      e.preventDefault();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Creating your account…';
      // Small delay so it feels real; then go to the success page.
      setTimeout(function () { window.location.href = 'welcome.html'; }, 700);
      return false;
    }
  </script>
</body>
</html>
